ans":"A","cat":"气象专业","exp":""},{"id":"277","text":"在远离海岸的远海中，风海流的表层流向","opts":{"A":"与风向反向","B":"在北半球偏于风的去向右边45°","C":"与风向同向","D":"在北半球偏于风的来向右边45°"},"ans":"B","cat":"气象专业","exp":""},{"id":"278","text":"北半球无限深海中，风海流的方向和流速随着深度的增加如何变化","opts":{"A":"方向向右偏转，流速变大","B":"方向向左偏转，流速变大","C":"方向向右偏转，流速变小","D":"方向向左偏转，流速变小"},"ans":"C","cat":"气象专业","exp":""},{"id":"279","text":"风海流分为","opts":{"A":"风生流，地转流","B":"地转流，补偿流","C":"定海流，地转流","D":"定海流，风生流"},"ans":"D","cat":"气象专业","exp":""},{"id":"280","text":"表层风海流的大小","opts":{"A":"与海面风速成正比","B":"与海面风速成反比","C":"与纬度正弦成反比","D":"与纬度的正弦平方根成正比"},"ans":"A","cat":"气象专业","exp":""},{"id":"281","text":"若深海海面风向为NE风，则表层风海流的流向应为","opts":{"A":"在北半球为南流、在南半球为西流","B":"在北半球为西流、在南半球为北流","C":"在北半球为南流、在南半球为东流","D":"在北半球为北流、在南半球为西流"},"ans":"B","cat":"气象专业","exp":""},{"id":"282","text":"若深海海面风向为SE风，则表层风海流的流向应为","opts":{"A":"在北半球为南流、在南半球为西流","B":"在北半球为西流、在南半球为北流","C":"在北半球为南流、在南半球为东流","D":"在北半球为北流、在南半球为西流"},"ans":"D","cat":"气象专业","exp":""},{"id":"283","text":"若深海海面风向为NW风，则表层风海流的流向应为","opts":{"A":"在北半球为南流、在南半球为东流","B":"在北半球为西流、在南半球为北流","C":"在北半球为东流、在南半球为南流","D":"在北半球为北流、在南半球为西流"},"ans":"A","cat":"气象专业","exp":""},{"id":"284","text":"下列说法正确的是","opts":{"A":"冷海流是指水温低的海流，也称寒流","B":"冷海流是指水温低于它所流经海域水温的海流","C":"冷海流是指由海水深处流向表层的海流","D":"冷海流是指由海水表层流向深处的海流"},"ans":"B","cat":"气象专业","exp":""},{"id":"285","text":"北太平洋的主要表层海流系统为","opts":{"A":"低纬度为顺时针环流，高纬度为逆时针环流","B":"低纬度为逆时针环流，高纬度为顺时针环流","C":"低纬度为顺时针环流，高纬度为顺时针环流","D":"低纬度为逆时针环流，高纬度为逆时针环流"},"ans":"A","cat":"气象专业","exp":""},{"id":"286","text":"北大西洋的主要表层海流系统为","opts":{"A":"低纬度为顺时针环流，高纬度为顺时针环流","B":"低纬度为逆时针环流，高纬度为顺时针环流","C":"低纬度为顺时针环流，高纬度为逆时针环流","D":"低纬度为逆时针环流，高纬度为逆时针环流"},"ans":"C","cat":"气象专业","exp":""},{"id":"287","text":"北赤道海流和南赤道海流的流向为","opts":{"A":"北赤道海流向北，南赤道海流向南","B":"都是从西向东","C":"北赤道海流向南，南赤道海流向北","D":"都是从东向西"},"ans":"D","cat":"气象专业","exp":""},{"id":"288","text":"存在冷水环流和暖水环流两个海流环流的大洋是","opts":{"A":"南印度洋、北大西洋","B":"北印度洋、北太平洋","C":"南太平洋、南印度洋","D":"北太平洋、北大西洋"},"ans":"D","cat":"气象专业","exp":""},{"id":"289","text":"北大西洋低纬度和高纬度存在着两个海流环流是","opts":{"A":"低纬的顺时针环流，高纬的逆时针环流","B":"低纬的逆时针环流，高纬的顺时针环流","C":"低纬的顺时针环流，高纬的顺时针环流","D":"低纬的逆时针环流，高纬的逆时针环流"},"ans":"A","cat":"气象专业","exp":""},{"id":"290","text":"依据大洋环流模式，南半球中、低纬度海面上的环流系统为","opts":{"A":"逆时针方向大环流圈","B":"季风环流圈","C":"顺时针方向大环流圈","D":"逆时针方向小环流圈"},"ans":"A","cat":"气象专业","exp":""},{"id":"291","text":"根据世界大洋海流模式，北半球中、低纬度海面呈","opts":{"A":"顺时针环流，属暖水环流系统","B":"顺时针环流，属冷水环流系统","C":"逆时针环流，属冷水环流系统","D":"逆时针环流，属暖水环流系统"},"ans":"A","cat":"气象专业","exp":""},{"id":"292","text":"在南半球自赤道至南纬40°之间的三大洋海流模式是","opts":{"A":"各成一个顺时针大环流","B":"各大洋沟通的自西向东环流","C":"各成一个逆时针大环流","D":"各大洋沟通的自东向西环流"},"ans":"C","cat":"气象专业","exp":""},{"id":"293","text":"形成世界大洋表层环流系统的主要因素是","opts":{"A":"同一纬度气压分布不均匀","B":"气温沿纬度分布不均匀","C":"潮涨潮落","D":"盛行风带"},"ans":"D","cat":"气象专业","exp":""},{"id":"294","text":"世界海洋主要表层环流系统的形成是 等因子共同作用的结果。","opts":{"A":"盛行风带、地转偏向力、海陆岸形分布","B":"地转风、梯度风","C":"水平压强梯度力、水平地转偏向力","D":"风对海面的切应力、地转偏向力、黏滞摩擦力"},"ans":"A","cat":"气象专业","exp":""},{"id":"295","text":"亲潮和黑潮的汇合处是","opts":{"A":"千岛群岛南部","B":"琉球群岛东部","C":"夏威夷群岛一带","D":"北海道东南大约40°N一带"},"ans":"D","cat":"气象专业","exp":""},{"id":"296","text":"世界上最强大的两个寒流是","opts":{"A":"拉布拉多海流、亲潮","B":"墨西哥湾流、黑潮","C":"北大西洋流、北太平洋流","D":"北赤道流、南赤道流"},"ans":"A","cat":"气象专业","exp":""},{"id":"297","text":"世界上最强大的两个中性流是","opts":{"A":"拉布拉多海流、亲潮","B":"墨西哥湾流、黑潮","C":"北大西洋流、北太平洋流","D":"北赤道流、南赤道流"},"ans":"D","cat":"气象专业","exp":""},{"id":"298","text":"地中海与其它海洋的海流有何不同","opts":{"A":"属于季风海流","B":"独自形成一个逆时针环流","C":"自东向西流","D":"独自形成一个顺时针环流"},"ans":"B","cat":"气象专业","exp":""},{"id":"299","text":"阿拉伯海和孟加拉湾的海流","opts":{"A":"冬季为顺时针季风流，夏季为逆时针季风流","B":"冬夏季均为顺时针季风流","C":"冬季为逆时针季风流，夏季为顺时针季风流","D":"冬夏季均为逆时针季风流"},"ans":"C","cat":"气象专业","exp":""},{"id":"300","text":"地中海的海流基本为","opts":{"A":"非洲沿海为东流，欧洲沿海东流","B":"非洲沿海为东流，欧洲沿海东流","C":"非洲和欧洲沿海均为西流","D":"非洲和欧洲沿海均为东流"},"ans":"A","cat":"气象专业","exp":""},{"id":"301","text":"阿拉伯海的表层海流","opts":{"A":"夏季为左旋季风流，冬季为右旋季风流","B":"夏季为右旋季风流，冬季为左旋季风流","C":"全年均为右旋季风流","D":"全年均为左旋季风流"},"ans":"B","cat":"气象专业","exp":""},{"id":"302","text":"孟加拉湾的表层海流","opt cat":"气象专业","exp":""},{"id":"315","text":"“海浪”通常是指","opts":{"A":"风浪、涌浪、近岸浪","B":"风浪、涌浪、海啸","C":"涌浪、海啸、潮波","D":"海啸、潮波、内波"},"ans":"A","cat":"气象专业","exp":""},{"id":"316","text":"由于气象原因引起的海水波浪有哪些？Ⅰ．风暴潮；Ⅱ．地震波；Ⅲ．潮汐波；Ⅳ．风浪；Ⅴ．内波；Ⅵ．涌浪","opts":{"A":"Ⅰ、Ⅲ、Ⅳ、Ⅴ、Ⅵ","B":"Ⅰ、Ⅳ、Ⅵ","C":"Ⅰ、Ⅱ、Ⅳ、Ⅴ、Ⅵ","D":"Ⅰ、Ⅱ、Ⅳ、Ⅴ"},"ans":"B","cat":"气象专业","exp":""},{"id":"317","text":"通常海浪其内涵应包括：Ⅰ．海啸；Ⅱ．风浪；Ⅲ．涌浪；Ⅳ．近岸浪；Ⅴ．内波；Ⅵ．潮波","opts":{"A":"Ⅰ、Ⅱ、Ⅲ、Ⅳ、Ⅵ","B":"Ⅰ、Ⅱ、Ⅲ、","C":"Ⅱ、Ⅲ、Ⅳ、Ⅴ","D":"Ⅱ、Ⅲ、Ⅳ"},"ans":"D","cat":"气象专业","exp":""},{"id":"318","text":"根据有关规定，船舶观测海浪时应","opts":{"A":"对风浪和涌浪分别进行观测和记录","B":"对风浪和涌浪的合成波进行观测和记录","C":"选取风浪和涌浪两者波高大者进行观测和记录","D":"对有效波高进行观测和记录"},"ans":"A","cat":"气象专业","exp":""},{"id":"319","text":"涌浪是指","opts":{"A":"风区内的风直接吹刮海面引起的海面波动","B":"在海洋中，密度相差较大的水层界面上的波动","C":"由两列波向相反的正弦波叠加得到一种波形不向前传播的波","D":"风浪离开风区传至远处的波浪或风区里风停息后遗留下来的波浪"},"ans":"D","cat":"气象专业","exp":""},{"id":"320","text":"风浪是指","opts":{"A":"风区内的风直接吹刮海面引起的海面波动","B":"风浪离开风区传至远处的波浪或风区里风停息后遗留下来的波浪","C":"风浪或涌浪传至浅水或近岸区域后，因受地形影响将发生一系列变化的波浪","D":"因强热带风暴、台风、寒潮等强风暴影响引起的海面异常升高的现象"},"ans":"A","cat":"气象专业","exp":""},{"id":"321","text":"深水波的波速与下列哪些因素有关？Ⅰ．风速；Ⅱ．波长；Ⅲ．周期；Ⅳ．水深","opts":{"A":"Ⅰ、Ⅱ","B":"Ⅱ、Ⅲ、","C":"Ⅲ、Ⅳ","D":"Ⅰ、Ⅳ"},"ans":"B","cat":"气象专业","exp":""},{"id":"322","text":"深水波是","opts":{"A":"波长远小于海深的波","B":"波长远大于海深的波","C":"波长等于海深的波","D":"水深大于10m时出现的波"},"ans":"A","cat":"气象专业","exp":""},{"id":"323","text":"浅水波是","opts":{"A":"波长远小于海深的波","B":"波长远大于海深的波","C":"波长等于海深的波","D":"水深小于10m时出现的波"},"ans":"B","cat":"气象专业","exp":""},{"id":"324","text":"海面风浪大小除了与风力大小有关外，还与下列哪些因素有关","opts":{"A":"水温和水深","B":"风时和水深","C":"风区和水深","D":"风区和风时"},"ans":"D","cat":"气象专业","exp":""},{"id":"325","text":"当风的要素相同时，风浪的尺寸","opts":{"A":"在深水中的大，在浅水中的小","B":"与水深无关","C":"在深水中的小，浅水中的大","D":"水温高则大，水温低则小"},"ans":"A","cat":"气象专业","exp":""},{"id":"326","text":"风浪成长三要素是指","opts":{"A":"风力、水深、风区","B":"水深、风区、风时","C":"风速、风区、风时","D":"风力、风时、水深"},"ans":"C","cat":"气象专业","exp":""},{"id":"327","text":"风浪的三种状态是指","opts":{"A":"初生状态、发展状态、消亡状态","B":"过渡状态、定常状态、充分成长状态","C":"初生状态、成熟状态、充分成长状态","D":"过渡状态、发展状态、定常状态"},"ans":"B","cat":"气象专业","exp":""},{"id":"328","text":"涌浪在其传播过程中的重要特点是","opts":{"A":"周期不变、波长和波高增大","B":"波高增加的同时，周期和波长变小","C":"波高不变，波长和周期变大","D":"波高衰减的同时，周期和波长变大"},"ans":"D","cat":"气象专业","exp":""},{"id":"329","text":"在涌浪波高衰减的过程中","opts":{"A":"波长大的衰减快，小的衰减慢","B":"波高衰减时，波长变小","C":"波长大的衰减慢，小的衰减快","D":"大波高衰减慢，小的衰减快"},"ans":"C","cat":"气象专业","exp":""},{"id":"330","text":"涌浪在传播过程中","opts":{"A":"波高衰减，周期和波长逐渐加大","B":"波高增大，周期和波长逐渐加大","C":"波高不变，波长和周期逐渐加大","D":"周期不变，波长和波高逐渐加大"},"ans":"A","cat":"气象专业","exp":""},{"id":"331","text":"涌浪在传播过程中，逐渐衰减的因素有：Ⅰ．波高；Ⅱ．波长；Ⅲ．周期","opts":{"A":"Ⅰ","B":"Ⅰ、Ⅱ","C":"Ⅱ、Ⅲ","D":"Ⅰ、Ⅱ"},"ans":"A","cat":"气象专业","exp":""},{"id":"332","text":"海啸在外海引起的波浪特征是：Ⅰ．波速大；Ⅱ．波高很高；Ⅲ．波长很长；Ⅳ．波速小；Ⅴ．波高不明显；Ⅵ．波长短","opts":{"A":"Ⅰ、Ⅱ、Ⅲ","B":"Ⅰ、Ⅲ、Ⅴ","C":"Ⅳ、Ⅴ、Ⅵ","D":"Ⅱ、Ⅳ、Ⅵ"},"ans":"B","cat":"气象专业","exp":""},{"id":"333","text":"当波浪由深水区传至浅水或近岸区域，其变化为","opts":{"A":"波向不变","B":"波高减小","C":"波面变陡，卷倒和破碎","D":"波长增大"},"ans":"C","cat":"气象专业","exp":""},{"id":"334","text":"当波浪由深水区传至浅水或近岸区域，会出现：Ⅰ．能量集中，波高增大；Ⅱ．波面变陡、卷倒和破碎；Ⅲ．波向折射、绕射和反射；Ⅳ．能量分散，波高减小；Ⅴ．波面变缓、卷倒和破碎；Ⅵ．波向不变","opts":{"A":"Ⅱ、Ⅲ、Ⅳ、Ⅵ","B":"Ⅰ、Ⅴ、Ⅵ","C":"Ⅰ、Ⅱ、Ⅲ","D":"Ⅳ、Ⅴ、Ⅵ"},"ans":"C","cat":"气象专业","exp":""},{"id":"335","text":"下列哪种情况，有利于波浪的波高增大？","opts":{"A":"气温高于水温","B":"波浪与海流的方向正交","C":"波浪与海流同向","D":"波浪与海流相向或接近相向"},"ans":"D","cat":"气象专业","exp":""},{"id":"336","text":"关于流波效应的研究表明，有利于波高增大的情况是","opts":{"A":"波浪和海流的运动方向相反或接近相反","B":"波浪和海流的运动方向相同或接近相同","C":"波浪与海流的方向正交","D":"流速比波速小很多"},"ans":"A","cat":"气象专业","exp":""},{"id":"337","text":"关于流波效应的研究表明","opts":{"A":"波浪和海流的运动方向相反或接近相反时，波高减小","B":"波浪和海流的运动方向相反或接近相反时，波高不变","C":"波浪和海流的运动方向相同或接近相同时，波高减小","D":"波浪和海流的运动方向相同或接近相同时，波高增大"},"ans":"C","cat":"气象专业","exp":""},{"id":"338","text":"关于流波效应的研究表明：","opts":{"A":"波浪和海流的运动方向相同或接近相同时，波高不变","B":"波浪和海流的运动方向相同或接近相同时，波高增大","C":"波浪和海流的运动方向相反或接近相反时，波高减小","D":"波浪和海流的运动方向相反或接近相反时，波高增大"},"ans":"A","cat":"气象专业","exp":""},{"id":"339","text":"关于海气温差对海浪影响的研究表明，有利于波高增大的情况是","opts":{"A":"气温远高于海温","B":"波高与海气温差无关","C":"气温远高于海温","D":"海温远高于气温"},"ans":"D","cat":"气象专业","exp":""},{"id":"340","text":"冬季北太平洋日本关东东部黑潮流域，有时出现比预料高2-3倍的异常大浪，有魔鬼海域之称。其原因是","opts":{"A":"水温高于气温达10℃以上和流波效应","B":"气温高于水温达10℃以上和流波效应","C":"海底地形影响和流波效应","D":"海底地形影响和气旋爆发性发展"},"ans":"A","cat":"气象专业","exp":""},{"id":"341","text":"下列哪些波高比有效波高大？Ⅰ．频繁出现的波高；Ⅱ．平均波高H；Ⅲ．H1/100；Ⅳ．H1/1000；Ⅴ．H1/10000；Ⅵ．H1/500","opts":{"A":"Ⅰ、Ⅲ、Ⅳ、Ⅴ、Ⅵ","B":"Ⅰ、Ⅱ、Ⅳ、Ⅴ、Ⅵ","C":"Ⅲ、Ⅳ、Ⅴ、Ⅵ","D":"Ⅱ、Ⅳ、Ⅴ、Ⅵ"},"ans":"C","cat":"气象专业","exp":""},{"id":"342","text":"太平洋波浪的基本状况之一是","opts":{"A":"北太平洋南部夏季波浪最大","B":"北太平洋北部2月份波浪最大","C":"南太平洋北部2月份波浪最大","D":"南太平洋南部夏季波浪较大"},"ans":"B","cat":"气象专业","exp":""},{"id":"343","text":"世界大洋大浪频率全年最高的海域为","opts":{"A":"冬季北大西洋的中高纬","B":"南半球西风带","C":"夏季北印度洋","D":"冬季北太平洋的中高纬"},"ans":"B","cat":"气象专业","exp":""},{"id":"344","text":"下列为世界著名的狂风恶浪海域的有：Ⅰ．好望角附近海面；Ⅱ．比斯开湾；Ⅲ．夏季北印度洋；Ⅳ．百慕大附近洋面；Ⅴ．夏季北大西洋；Ⅵ．冬季北太平洋中高纬度洋面","opts":{"A":"Ⅰ、Ⅱ、Ⅲ、Ⅳ、Ⅵ","B":"Ⅰ、Ⅱ、Ⅳ、Ⅴ、Ⅵ","C":"Ⅱ、Ⅲ、Ⅳ、Ⅵ","D":"Ⅰ、Ⅱ、Ⅲ、Ⅵ"},"ans":"D","cat":"气象专业","exp":""},{"id":"345","text":"冬半年比斯开湾航线海况十分恶劣，经常出现10ｍ以上的大浪，这是因为：Ⅰ．冬半年北大西洋中高纬为狂风恶浪区；Ⅱ．湾口对着大西洋，当波浪传入后，水深变浅，波高剧增；Ⅲ．因狭管效应，从北岸流入南岸流出的海流又进一步使波高增大；Ⅳ．冬半年北大西洋低纬度海域为狂风恶浪区；Ⅴ．湾口对着大西洋，当波浪传入后，水深变浅，波高减小；Ⅵ．因流波效应，从北岸流入南岸流出的海流又进一步使波高增大","opts":{"A":"Ⅰ、Ⅱ、Ⅵ","B":"Ⅰ、Ⅱ、Ⅳ、Ⅵ","C":"Ⅲ、Ⅳ、Ⅴ、Ⅵ","D":"Ⅱ、Ⅳ、Ⅵ"},"ans":"A","cat":"气象专业","exp":""},{"id":"346","text":"冬半年比斯开湾航线海况十分恶劣，经常可以遇到10m以上大浪，这是因为","opts":{"A":"冬半年北大西洋低纬海域为狂风恶浪区","B":"湾口对着大西洋，当波浪传入后，水深变浅，波高剧增","C":"因狭管效应，从北岸流入南岸流出的海流又进一步使波高增大","D":"湾口对着大西洋，当波浪传入后，水深变浅，波高剧增"},"ans":"D","cat":"气象专业","exp":""},{"id":"347","text":"在水平方向上物理属性比较均匀的大块空气称为气团，此物理属性一般指","opts":{"A":"湿度，气压，能见度","B":"湿度，温度，风","C":"温度，湿度，大气稳定度","D":"湿度，气压，云"},"ans":"C","cat":"气象专业","exp":""},{"id":"348","text":"一般气团的尺度","opts":{"A":"水平范围为几百公里至几千公里","B":"垂直范围为几十公里至几百公里","C":"水平范围为几公里至十几公里","D":"垂直范围为1公里"},"ans":"A","cat":"气象专业","exp":""},{"id":"349","text":"气团的形成必须具备的条件为","opts":{"A":"大范围物理性质较均匀下垫面和不稳定环流条件","B":"大范围比较平坦的下垫面和适当的环流条件","C":"大范围物理性质不均匀下垫面和适当的环流条件","D":"大范围物理性质比较均匀下垫面和适当的环流条件"},"ans":"D","cat":"气象专业","exp":""},{"id":"350","text":"形成气团的条件为","opts":{"A":"大范围物理性质不均匀的下垫面","B":"能使空气较长时间停留在下垫面上的环流条件","C":"能使空气较快通过所在下 程序图标, 在弹出的系统快捷菜单中选\"打开\"命令","D":"用鼠标右键单击应用程序图标，然后按ENTER键"},"ans":"D","cat":"气象测报","exp":""},{"id":"700","text":"在WINDOWS 98中，若要同时运行两个程序，则","opts":{"A":"两个程序可以同一时刻占用同一处理器","B":"只有在一个程序放弃处理器控制权后，另一个程序才能占用该处理器","C":"一个程序占用处理器运行时，另一个程序可以抢占该处理器运行","D":"一个程序一直占用处理器并运行完成后，另一个程序才能占用该处理"},"ans":"C","cat":"气象测报","exp":""},{"id":"701","text":"在“我的电脑”各级文件夹窗口中，如果需要选择多个不连续排列的文件，正确的操作是","opts":{"A":"按Alt+单击要选定的文件对象","B":"按Ctrl+单击要选定的文件对象","C":"按Shift+单击要选定的文件对象","D":"按Ctrl+双击要选定的文件对象"},"ans":"B","cat":"气象测报","exp":""},{"id":"702","text":"在WINDOWS 98默认环境中，若已找到了文件名为try.bat的文件，哪种方法不能编辑该文件","opts":{"A":"用鼠标左键双击该文件","B":"用鼠标右键单击该文件，在弹出的系统快捷菜单中选\"编辑\"命令","C":"首先启动\"记事本\"程序，然后用\"文件/打开\"菜单打开该文件","D":"首先启动\"写字板\"程序，然后用\"文件/打开\"菜单打开该文件"},"ans":"A","cat":"气象测报","exp":""},{"id":"703","text":"AHDM4.1中的主启动程序文件是：","opts":{"A":"AHDOS.EXE","B":"AHDOS.COM C、AHDM.EXE","D":"AHDM.COM E、AH41.EXE"},"ans":"A","cat":"气象测报","exp":""},{"id":"704","text":"在添加TCP/IP协议时，需经过以下几步","opts":{"A":"(1)(2)(3)(4)","B":"(2)(1)(4)(3)","C":"(3)(4)(1)(2)","D":"(2)(1)(3)(4)"},"ans":"D","cat":"气象测报","exp":""},{"id":"705","text":"随着现代气象业务发展，综合气象观测业务的基础支撑不足、发展不够协调等问题日益突出，主要表现在： A 、 B、 C、","opts":{"A":"气象综合观测能力和系统稳定可靠运行能力有待提高","B":"气象探测环境保护与经济社会发展的矛盾日显突出，观测站网布局的科学性有待增强","C":"科技支撑能力薄弱，人才队伍建设滞后，体制机制有待完善","D":"多种观测资料综合应用能力和效益发挥有待加强。"},"ans":"D","cat":"气象业务","exp":""},{"id":"706","text":"在西风带中长波槽脊的发展演变过程中，在槽不断向南加深时，高空冷槽与北方冷空气的联系会被暖空气切断，在槽的南边形成一个孤立的（  ），叫切断低压。","opts":{"A":"非闭合冷性低压中心","B":"闭合冷性低压中心","C":"低压中心","D":"冷性低压"},"ans":"B","cat":"气象知识","exp":""},{"id":"707","text":"以下不属于南亚高压的特征的是（  ）。","opts":{"A":"具有行星尺度的反气旋环流特征","B":"是对流层上部的暖高压","C":"具有独特的垂直环流","D":"是一个稳定而少动的深厚系统"},"ans":"D","cat":"气象知识","exp":""},{"id":"708","text":"在山地背风坡中的下降气流中飞行时，除造成飞机掉高度外，还可造成严重危害的原因是：","opts":{"A":"气压式高度表读数高于实际高度","B":"空速表误差增大","C":"地速减小"},"ans":"A","cat":"航空气象","exp":""},{"id":"709","text":"飞机积冰的产生，主要是由于云中存在：","opts":{"A":"大小不等的水滴","B":"雪花和冰晶","C":"过冷水滴"},"ans":"C","cat":"航空气象","exp":""},{"id":"710","text":"关于飞机积冰，下列正确的是：","opts":{"A":"飞机积冰一般发生在-1-15℃的温度范围内","B":"在-2-10℃温度范围内遭遇积冰的次数最多","C":"强烈的积冰主要发生在-4~-8℃的温度范围内"},"ans":"B","cat":"航空气象","exp":""},{"id":"711","text":"在温暖的天气飞行在较低高度，有时会遇上湍流空气，以下描述正确的是：","opts":{"A":"很可能在路面和荒地上空发生上升气流","B":"在类似成片树林的广阔植被区域发生上升气流","C":"在大片水体区域发生上升气流"},"ans":"A","cat":"航空气象","exp":""},{"id":"712","text":"气温高低，如何影响飞机滑跑距离？","opts":{"A":"气温高时，空气密度小，飞机增速慢，飞机的离地速度增大，起飞滑跑距离要长","B":"气温低时，空气密度小，飞机增速快，飞机升力减小，起飞滑跑距离要长","C":"气温高时，空气密度大，飞机增速快，飞机升力增大，起飞滑跑距离要短"},"ans":"A","cat":"航空气象","exp":""},{"id":"713","text":"在处于雷暴区边缘的机场起飞或着陆时，要特别注意的危险天气是：","opts":{"A":"低空风切变","B":"冰雹和暴雨","C":"积冰和雷击"},"ans":"A","cat":"航空气象","exp":""},{"id":"714","text":"在下述何种情况下容易碰到风切变：","opts":{"A":"逆温层附近或靠近雷暴时","B":"当风速大于65千米/小时时","C":"有高气压时"},"ans":"A","cat":"航空气象","exp":""},{"id":"715","text":"形成雷暴的基本条件是：","opts":{"A":"充足的水汽和上升运动","B":"充足的水汽，不稳定的大气和上升运动","C":"浓积云，充足的水汽和锋区"},"ans":"B","cat":"航空气象","exp":""},{"id":"716","text":"在雷暴的生存周期中，哪一阶段的特征使云中充满下降气流？","opts":{"A":"积云阶段","B":"成熟阶段","C":"消散阶段"},"ans":"C","cat":"航空气象","exp":""},{"id":"717","text":"下面关于气团的叙述哪一个正确？","opts":{"A":"我国地域广大，能形成各种气团","B":"气团离开源地，其性质将会发生变化","C":"气团只形成于极地和大洋地区"},"ans":"B","cat":"航空气象","exp":""},{"id":"718","text":"关于锋面，下列哪种描述正确？","opts":{"A":"锋面就是不同方向的风交汇的界面","B":"锋面就是温度、湿度等物理性质不同的两种气团的交界面","C":"锋面就是风场与地面的交线，也简称为锋"},"ans":"B","cat":"航空气象","exp":""},{"id":"719","text":"当来自北方的冷气团和来自南方的暖气团，两者势均力敌，强度相当时，它们的交锋区很少移动，这种锋面称为：","opts":{"A":"静止锋","B":"交错锋","C":"融合锋"},"ans":"A","cat":"航空气象","exp":""},{"id":"720","text":"当机翼和尾翼积冰时，下列不正确的描述是：","opts":{"A":"翼型失真（变形）","B":"导致摩擦阻力减少","C":"压差阻力都增大"},"ans":"B","cat":"航空气象","exp":""},{"id":"721","text":"关于风切变出现的地方，下述说法正确的是：","opts":{"A":"仅在雷暴中出现","B":"在气压和温度急剧下降的地方出现","C":"在大气中任何高度上存在风向和风速变化的地方"},"ans":"C","cat":"航空气象","exp":""},{"id":"722","text":"飞机外表面的冰霜雪等:","opts":{"A":"会引起飞机操纵效能增加","B":"会出现指令仰角变化和滚转","C":"会使外表面变得粗糙，增加阻力，减少升力"},"ans":"C","cat":"航空气象","exp":""},{"id":"723","text":"根据国际民航组织的规定，云满天时的云量为：","opts":{"A":"12","B":"10"},"ans":"B","cat":"航空气象","exp":""},{"id":"724","text":"大气稳定度指整层空气的稳定程度，有时也称大气垂直稳定度。以哪种运动来判定？","opts":{"A":"以大气的气温垂直加速度运动来判定","B":"以大气的气温垂直速度运动来判定","C":"以大气的气压垂直速度运动来判定"},"ans":"A","cat":"航空气象","exp":""},{"id":"725","text":"夜间温度降低，低层常常出现逆温，会使得：","opts":{"A":"早晨天气晴朗","B":"早晨有雾和烟幕","C":"早晨有大风"},"ans":"B","cat":"航空气象","exp":""},{"id":"726","text":"在地表的风向稍微不同于地表之上几千英尺高度的风向的原因是：","opts":{"A":"当地地形影响气压","B":"地面有较强的地转偏向力？","C":"风和地面之间的磨擦作用"},"ans":"C","cat":"航空气象","exp":""},{"id":"727","text":"形成海陆风的对流性环流的原因是因为：","opts":{"A":"从水面吹向陆地的空气较暖，密度小，导致空气上升","B":"陆地吸收和散发热量比水面快","C":"从水面吹向陆地的空气冷，密度大，使空气上升"},"ans":"B","cat":"航空气象","exp":""},{"id":"728","text":"下面大气分层的主要依据哪个是正确的？","opts":{"A":"气层气压的垂直分布特点","B":"气层气温的垂直分布特点","C":"气层中风的垂直变化特点"},"ans":"B","cat":"航空气象","exp":""},{"id":"729","text":"在标准大气中，海平面上的气温和气压值是：","opts":{"A":"15℃.1000hPa","B":"0℃.760mmHg","C":"15℃.1013.25hPa"},"ans":"C","cat":"航空气象","exp":""},{"id":"730","text":"气象上把气温垂直递减率等于零（即γ=0）的气层称为：","opts":{"A":"逆温层","B":"等温层","C":"不稳定气层"},"ans":"B","cat":"航空气象","exp":""},{"id":"731","text":"露点温度指空气在水汽含量和气压都不改变的条件下，冷却到饱和时的温度。形象地说，就是空气中的水蒸气变为露珠时候的温度叫露点温度。下述哪个正确？","opts":{"A":"当空气中水汽已达到饱和时，气温与露点温度相同","B":"当水汽未达到饱和时，气温一定低于露点温度","C":"在100%的相对湿度时，周围环境的温度高于露点温度"},"ans":"A","cat":"航空气象","exp":""},{"id":"732","text":"飞机按气压式高度表指示的一定高度飞行，在飞向低压区时，飞机的实际高度将：","opts":{"A":"保持不变","B":"逐渐升高","C":"逐渐降低"},"ans":"C","cat":"航空气象","exp":""},{"id":"733","text":"下列选项中，哪些属于犯罪中止的要件？（ ）","opts":{"A":"必须自动放弃犯罪","B":"必须是彻底放弃犯罪","C":"必须有效防止犯罪结果发生","D":"必须是在危害结果产生之前放弃犯罪"},"ans":"A","cat":"公共基础","exp":""},{"id":"734","text":"中国特色社会主义的总任务是（ ）。","opts":{"A":"实现社会主义","B":"实现社会主义现代化和中华民族的伟大复兴","C":"建成小康社会","D":"解放生产力、发展生产力"},"ans":"B","cat":"公共基础","exp":""},{"id":"735","text":"商品的自然属性指商品的（ ）。","opts":{"A":"价值","B":"价格","C":"使用价值","D":"交换价值"},"ans":"C","cat":"公共基础","exp":""},{"id":"736","text":"法律关系客体是指法律关系主体之间的权利和义务所指向的对象，因此，若以一双鞋的买卖法律关系为例，小王是买方，她的义务是支付鞋的价金，权利是取得鞋子；小张是卖方，她的义务是交付鞋子，权利是取得价金，则（　）是这个买卖法律关系里面的客体。","opts":{"A":"小王和价金","B":"鞋子和价金","C":"小王和鞋子","D":"小张和小王"},"ans":"B","cat":"公共基础","exp":""},{"id":"737","text":"WindowsXP到4月8日将中止官方支持，美国计   <div class="qac">
    <button class="btn bs" onclick="exitQ()" style="flex:1">退出</button>
    <button id="nxt" class="btn bp" onclick="nextQ()" style="flex:2;display:none">下一题 →</button>
  </div>
</div>

<div id="s-result" class="screen">
  <div class="card">
    <div class="rpct" id="rpct"></div>
    <div class="rsb" id="rsb"></div>
    <div class="rmg" id="rmg"></div>
    <div class="sg" style="margin-bottom:16px">
      <div class="sc"><div class="sn" id="rt"></div><div class="sl">总题数</div></div>
      <div class="sc"><div class="sn" style="color:#43A047" id="rc"></div><div class="sl">答对</div></div>
      <div class="sc"><div class="sn" style="color:#E53935" id="rw"></div><div class="sl">答错</div></div>
    </div>
    <button class="btn bp" onclick="startQuiz()" style="margin-bottom:10px">再来一次</button>
    <button class="btn bs" onclick="exitQ()">返回首页</button>
  </div>
</div>

</div>

<div class="bnav" id="bnav">
  <button class="ni on" id="n-home" onclick="showTab('home')"><span class="nic">🏠</span>首页</button>
  <button class="ni" id="n-manage" onclick="showTab('manage')"><span class="nic">📋</span>题库</button>
</div>
<div class="toast" id="tst"></div>

<script>
var AQ=JSON.parse(document.getElementById('qdata').textContent);
var FAV=new Set(JSON.parse(localStorage.getItem('fav5')||'[]'));
var WRG=new Set(JSON.parse(localStorage.getItem('wrg5')||'[]'));
var ql=[],qi=0,qs=0,ad=false,sm='all',mf='all';

function sv(){localStorage.setItem('fav5',JSON.stringify([...FAV]));localStorage.setItem('wrg5',JSON.stringify([...WRG]));}
function toast(m){var t=document.getElementById('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showTab(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on');});
  document.getElementById('s-'+id).classList.add('active');
  document.getElementById('n-'+id).classList.add('on');
  document.getElementById('bnav').style.display='flex';
  if(id==='home')renderHome();
  if(id==='manage')renderManage();
}

function renderHome(){
  document.getElementById('hst').innerHTML=
    '<div class="sc"><div class="sn">'+AQ.length+'</div><div class="sl">总题数</div></div>'+
    '<div class="sc"><div class="sn" style="color:#E65100">'+FAV.size+'</div><div class="sl">已收藏</div></div>'+
    '<div class="sc"><div class="sn" style="color:#C62828">'+WRG.size+'</div><div class="sl">错题数</div></div>';
  var cats=[...new Set(AQ.map(function(q){return q.cat;}))];
  document.getElementById('csel').innerHTML=cats.map(function(c){return '<option>'+esc(c)+'</option>';}).join('');
}

function selMode(m){
  sm=m;
  document.querySelectorAll('.mc').forEach(function(c){c.classList.remove('on');});
  document.getElementById('m-'+m).classList.add('on');
  document.getElementById('cpick').style.display=m==='cat'?'block':'none';
}

function getPool(){
  if(sm==='all')return AQ.slice();
  if(sm==='wrong')return AQ.filter(function(q){return WRG.has(q.id);});
  if(sm==='fav')return AQ.filter(function(q){return FAV.has(q.id);});
  var c=document.getElementById('csel').value;
  return AQ.filter(function(q){return q.cat===c;});
}

function startQuiz(){
  var p=getPool();
  if(!p.length){toast('该模式下暂无题目');return;}
  ql=p.sort(function(){return Math.random()-.5;});
  qi=0;qs=0;
  document.getElementById('bnav').style.display='none';
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('s-quiz').classList.add('active');
  showQ();
}

var IK=['如图','下图','见图','图示','右图','左图','上图','附图','图中'];
function hasImg(t){return IK.some(function(k){return t.indexOf(k)>=0;});}

function showQ(){
  var q=ql[qi],tot=ql.length;
  document.getElementById('qctr').textContent='第 '+(qi+1)+' / '+tot+' 题';
  document.getElementById('qcat').textContent=q.cat;
  document.getElementById('pf').style.width=(qi/tot*100)+'%';
  document.getElementById('qtxt').textContent=q.text;
  document.getElementById('qfb').style.display='none';
  document.getElementById('nxt').style.display='none';
  document.getElementById('fb2').textContent=FAV.has(q.id)?'★':'☆';
  ad=false;
  document.getElementById('qih').innerHTML=hasImg(q.text)?'<div class="iw">📷 本题配图暂缺，仅供参考</div>':'';
  var ks=Object.keys(q.opts).filter(function(k){return q.opts[k];});
  document.getElementById('qch').innerHTML=ks.map(function(k){
    return '<button class="cb" data-k="'+k+'" onclick="pickAns(this)">'+k+'. '+esc(q.opts[k])+'</button>';
  }).join('');
}

function pickAns(btn){
  if(ad)return;ad=true;
  var c=btn.getAttribute('data-k');
  var q=ql[qi],ok=c===q.ans;
  if(ok){qs++;WRG.delete(q.id);}else WRG.add(q.id);
  sv();
  document.querySelectorAll('.cb').forEach(function(b){
    var k=b.getAttribute('data-k');
    if(k===q.ans)b.classList.add('ok');
    else if(k===c&&!ok)b.classList.add('no');
  });
  var fb=document.getElementById('qfb');
  fb.className='fb '+(ok?'fbok':'fbno');
  fb.textContent=(ok?'✓ 回答正确！':'✗ 回答错误，正确答案是 '+q.ans+'。')+(q.exp?' '+q.exp:'');
  fb.style.display='block';
  document.getElementById('nxt').style.display='block';
}

function togFav(){
  var q=ql[qi];
  if(FAV.has(q.id)){FAV.delete(q.id);toast('已取消收藏');}else{FAV.add(q.id);toast('⭐ 已收藏');}
  sv();document.getElementById('fb2').textContent=FAV.has(q.id)?'★':'☆';
}

function nextQ(){qi++;if(qi>=ql.length)showResult();else showQ();}

function showResult(){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('s-result').classList.add('active');
  var t=ql.length,c=qs,pct=Math.round(c/t*100);
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rsb').textContent='答对 '+c+' / '+t+' 题';
  document.getElementById('rt').textContent=t;
  document.getElementById('rc').textContent=c;
  document.getElementById('rw').textContent=t-c;
  var ms=['继续努力！','加油，快突破了！','不错，再接再厉！','很好，继续保持！','优秀！','满分！太棒了！'];
  document.getElementById('rmg').textContent=ms[Math.min(Math.floor(pct/20),5)];
}

function exitQ(){document.getElementById('bnav').style.display='flex';showTab('home');}

function renderManage(){
  var cats=['all',...new Set(AQ.map(function(q){return q.cat;}))];
  document.getElementById('frow').innerHTML=cats.map(function(c){
    return '<button class="fc'+(mf===c?' on':'')+'" data-cat="'+esc(c)+'" onclick="setF(this)">'+(c==='all'?'全部':esc(c))+'</button>';
  }).join('');
  var list=mf==='all'?AQ:AQ.filter(function(q){return q.cat===mf;});
  if(!list.length){document.getElementById('mlist').innerHTML='<div class="empty">📭<br>暂无题目</div>';return;}
  document.getElementById('mlist').innerHTML=list.map(function(q){
    var isF=FAV.has(q.id),isW=WRG.has(q.id),isI=hasImg(q.text);
    return '<div class="qi">'+
      '<div class="qt">'+esc(q.text)+'</div>'+
      '<div class="qf">'+
        '<div class="tgs">'+
          '<span class="tg">'+esc(q.cat)+'</span>'+
          '<span class="tg">答案:'+q.ans+'</span>'+
          (isF?'<span class="tg tf">⭐收藏</span>':'')+
          (isW?'<span class="tg tw">✗错题</span>':'')+
          (isI?'<span class="tg" style="background:#FFF8E1;color:#E65100">📷暂缺图</span>':'')+
        '</div>'+
        '<button class="bsm" data-id="'+q.id+'" style="background:'+(isF?'#FFEBEE':'#EBF5FF')+';color:'+(isF?'#C62828':'#007AFF')+'" onclick="togFavM(this)">'+(isF?'取消':'收藏')+'</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function setF(btn){mf=btn.getAttribute('data-cat');renderManage();}
function togFavM(btn){
  var id=btn.getAttribute('data-id');
  if(FAV.has(id))FAV.delete(id);else FAV.add(id);
  sv();renderManage();
}

renderHome();
</script>
</body>
</html>
